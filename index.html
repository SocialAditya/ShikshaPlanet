<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Rate Us | Shiksha Planet</title>
  <meta name="description" content="Choose the platform where you purchased your Shiksha Planet book to rate and review it." />
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  
  <style>
    :root {
      --blue-950: #0c1a40;
      --blue-900: #0f2257;
      --blue-600: #2563eb;
      --white: #ffffff;
      --gray-100: #f1f5f9;
      --gray-200: #e2e8f0;
      --gray-700: #334155;
      
      --shadow-lg: 0 10px 40px rgba(0,0,0,0.12), 0 4px 16px rgba(0,0,0,0.08);
      --shadow-xl: 0 20px 60px rgba(0,0,0,0.15), 0 8px 24px rgba(0,0,0,0.1);
      
      --radius-lg: 20px;
      --radius-md: 12px;
      
      --transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: 'Inter', sans-serif;
      background: linear-gradient(135deg, var(--blue-950) 0%, #080f26 100%);
      color: var(--white);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 24px;
      overflow-x: hidden;
    }

    /* Background glow decorations */
    .bg-glow-1 {
      position: absolute;
      top: -10%;
      left: -10%;
      width: 40%;
      height: 40%;
      background: radial-gradient(circle, rgba(37, 99, 235, 0.15) 0%, rgba(0,0,0,0) 70%);
      pointer-events: none;
      z-index: 1;
    }

    .bg-glow-2 {
      position: absolute;
      bottom: -10%;
      right: -10%;
      width: 50%;
      height: 50%;
      background: radial-gradient(circle, rgba(37, 99, 235, 0.1) 0%, rgba(0,0,0,0) 70%);
      pointer-events: none;
      z-index: 1;
    }

    .container {
      width: 100%;
      max-width: 480px;
      background: rgba(255, 255, 255, 0.03);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      border: 1px solid rgba(255, 255, 255, 0.08);
      border-radius: var(--radius-lg);
      padding: 40px 32px;
      box-shadow: var(--shadow-xl);
      text-align: center;
      position: relative;
      z-index: 10;
      animation: fadeInUp 0.6s ease-out;
    }

    @keyframes fadeInUp {
      from {
        opacity: 0;
        transform: translateY(20px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    .logo-container {
      margin-bottom: 24px;
    }

    .logo-img {
      height: 56px;
      width: auto;
      filter: drop-shadow(0 4px 8px rgba(0,0,0,0.2));
    }

    .brand-name {
      font-size: 1.5rem;
      font-weight: 800;
      color: var(--white);
      letter-spacing: 0.5px;
      margin-bottom: 8px;
    }

    .subtitle {
      color: rgba(255, 255, 255, 0.7);
      font-size: 0.95rem;
      margin-bottom: 36px;
      line-height: 1.5;
    }

    .question-title {
      font-size: 1.15rem;
      font-weight: 600;
      color: var(--white);
      margin-bottom: 24px;
      position: relative;
      display: inline-block;
    }

    .question-title::after {
      content: '';
      position: absolute;
      bottom: -6px;
      left: 50%;
      transform: translateX(-50%);
      width: 40px;
      height: 2px;
      background: var(--blue-600);
      border-radius: 2px;
    }

    .button-stack {
      display: flex;
      flex-direction: column;
      gap: 16px;
    }

    .platform-btn {
      display: flex;
      align-items: center;
      justify-content: flex-start;
      padding: 16px 24px;
      border-radius: var(--radius-md);
      text-decoration: none;
      font-weight: 600;
      font-size: 1rem;
      transition: var(--transition);
      border: 1px solid rgba(255, 255, 255, 0.05);
      position: relative;
      overflow: hidden;
    }

    .platform-btn::before {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(255, 255, 255, 0.02);
      opacity: 0;
      transition: var(--transition);
    }

    .platform-btn:hover::before {
      opacity: 1;
    }

    .platform-btn:hover {
      transform: translateY(-3px);
      box-shadow: 0 8px 20px rgba(0,0,0,0.3);
    }

    .icon-container {
      width: 32px;
      height: 32px;
      display: flex;
      align-items: center;
      justify-content: center;
      margin-right: 16px;
      border-radius: 8px;
      background: rgba(255,255,255,0.08);
      flex-shrink: 0;
    }

    /* Amazon Button Styles */
    .btn-amazon {
      background: rgba(255, 153, 0, 0.1);
      color: #ff9900;
      border-color: rgba(255, 153, 0, 0.2);
    }
    .btn-amazon:hover {
      background: #ff9900;
      color: #111;
      border-color: #ff9900;
    }
    .btn-amazon:hover .icon-container {
      background: rgba(0, 0, 0, 0.15);
    }

    /* Flipkart Button Styles */
    .btn-flipkart {
      background: rgba(40, 116, 240, 0.1);
      color: #2874f0;
      border-color: rgba(40, 116, 240, 0.2);
    }
    .btn-flipkart:hover {
      background: #2874f0;
      color: var(--white);
      border-color: #2874f0;
    }
    .btn-flipkart:hover .icon-container {
      background: rgba(255, 255, 255, 0.2);
    }

    /* Shiksha Planet Store Button Styles */
    .btn-store {
      background: rgba(37, 99, 235, 0.1);
      color: #60a5fa;
      border-color: rgba(37, 99, 235, 0.2);
    }
    .btn-store:hover {
      background: var(--blue-600);
      color: var(--white);
      border-color: var(--blue-600);
    }
    .btn-store:hover .icon-container {
      background: rgba(255, 255, 255, 0.2);
    }

    .arrow-icon {
      margin-left: auto;
      opacity: 0.5;
      transition: var(--transition);
    }

    .platform-btn:hover .arrow-icon {
      transform: translateX(4px);
      opacity: 1;
    }

    .footer-text {
      margin-top: 36px;
      font-size: 0.8rem;
      color: rgba(255, 255, 255, 0.4);
      line-height: 1.4;
    }

    @media (max-width: 480px) {
      .container {
        padding: 32px 20px;
      }
      .brand-name {
        font-size: 1.35rem;
      }
    }
  </style>
</head>
<body>

  <div class="bg-glow-1"></div>
  <div class="bg-glow-2"></div>

  <div class="container">
    <div class="logo-container">
      <img class="logo-img" src="../images/logo.png" alt="Shiksha Planet Logo" onerror="this.style.display='none';">
      <div class="brand-name">Shiksha Planet</div>
    </div>
    
    <p class="subtitle">Thank you for purchasing our book! Your feedback helps us create better resources for competitive exam aspirants.</p>
    
    <div class="question-title">Aapne ye book kahan se kharidi?</div>
    
    <div class="button-stack">
      
      <!-- Amazon Link (Placeholder for now) -->
      <a href="https://www.amazon.in" target="_blank" rel="noopener noreferrer" class="platform-btn btn-amazon">
        <div class="icon-container">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="currentColor">
            <path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm1 14h-2v-6h2v6zm0-8h-2V6h2v2z"/>
          </svg>
        </div>
        <span>Amazon</span>
        <svg class="arrow-icon" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <polyline points="9 18 15 12 9 6"></polyline>
        </svg>
      </a>

      <!-- Flipkart Link (Placeholder for now) -->
      <a href="https://www.flipkart.com" target="_blank" rel="noopener noreferrer" class="platform-btn btn-flipkart">
        <div class="icon-container">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
            <path d="M6 2L3 6v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2V6l-3-4z"></path>
            <line x1="3" y1="6" x2="21" y2="6"></line>
            <path d="M16 10a4 4 0 0 1-8 0"></path>
          </svg>
        </div>
        <span>Flipkart</span>
        <svg class="arrow-icon" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <polyline points="9 18 15 12 9 6"></polyline>
        </svg>
      </a>

      <!-- Shiksha Planet Store Link -->
      <a href="https://store.shikshaplanet.in" target="_blank" rel="noopener noreferrer" class="platform-btn btn-store">
        <div class="icon-container">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
            <path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"></path>
            <polyline points="9 22 9 12 15 12 15 22"></polyline>
          </svg>
        </div>
        <span>Shiksha Planet Store</span>
        <svg class="arrow-icon" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <polyline points="9 18 15 12 9 6"></polyline>
        </svg>
      </a>
      
    </div>
    
    <p class="footer-text">Shiksha Planet &copy; 2026. Empowering India's music and competitive exam aspirants.</p>
  </div>

</body>
</html>
